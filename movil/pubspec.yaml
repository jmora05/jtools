name: esamen
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  pdf: ^3.10.1
  printing: ^5.10.4
  http: ^1.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_slidable: ^3.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logos/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logos/jtools_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F2347"
  adaptive_icon_foreground: "assets/images/logos/jtools_foreground.png"